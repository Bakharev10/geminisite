<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Artiste AI — Нейропоэзия</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0f172a;
    --card: rgba(30, 41, 59, 0.7);
    --accent: #38bdf8;
    --text: #f1f5f9;
}

[data-theme="light"] {
    --bg: #f8fafc;
    --card: rgba(255, 255, 255, 0.8);
    --accent: #0284c7;
    --text: #1e293b;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.glass-card {
    background: var(--card);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 40px;
    width: 90%;
    max-width: 500px;
    text-align: center;
}

h1 {
    font-family: 'Playfair Display', serif;
    color: var(--accent);
}

textarea {
    width: 100%;
    height: 100px;
    margin-top: 20px;
    border-radius: 12px;
    padding: 15px;
    border: 2px solid var(--accent);
    background: rgba(0,0,0,0.2);
    color: var(--text);
    resize: none;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
}

#result-box {
    margin-top: 20px;
    padding: 20px;
    background: rgba(0,0,0,0.1);
    border-radius: 12px;
    white-space: pre-wrap;
    font-style: italic;
}

.loader {
    display: none;
    border: 3px solid #fff;
    border-bottom-color: transparent;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    margin: 10px auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.theme-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="theme-toggle" onclick="toggleTheme()">☀️</div>

<div class="glass-card">
    <h1>L'Artiste AI</h1>
    <p>Поэзия через технологии</p>

    <textarea id="promptInput" placeholder="Введите тему..."></textarea>

    <button onclick="generatePoetry()">
        <span id="btnText">Создать стих</span>
    </button>

    <div class="loader" id="loader"></div>

    <div id="result-box">
        <div id="result-text">Здесь появится стих...</div>
    </div>
</div>

<script>
const ENDPOINT = "https://throbbing-sunset-6162.aleksandrbaharev37348.workers.dev";

async function generatePoetry() {
    const input = document.getElementById('promptInput');
    const result = document.getElementById('result-text');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');

    if (!input.value) {
        alert("Введите тему");
        return;
    }

    loader.style.display = 'block';
    btnText.style.display = 'none';
    result.innerText = "Генерация...";

    try {
        const res = await fetch(ENDPOINT, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: `Напиши красивое короткое стихотворение на тему: ${input.value}. Без пояснений.`
                    }]
                }]
            })
        });

        const data = await res.json();
        console.log(data);

        if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
            result.innerText = data.candidates[0].content.parts[0].text;
        } else if (data.error) {
            result.innerText = "Ошибка: " + data.error.message;
        } else {
            result.innerText = "Пустой ответ от нейросети";
        }

    } catch (e) {
        result.innerText = "Ошибка соединения";
    } finally {
        loader.style.display = 'none';
        btnText.style.display = 'inline';
    }
}

function toggleTheme() {
    const body = document.body;
    const current = body.getAttribute('data-theme');
    const newTheme = current === 'light' ? 'dark' : 'light';
    body.setAttribute('data-theme', newTheme);
}
</script>

</body>
</html>
