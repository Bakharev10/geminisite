<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Artiste AI — Нейропоэзия</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --accent: #0284c7;
            --text: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            transition: all 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--accent);
        }

        textarea {
            width: 100%;
            height: 100px;
            background: rgba(0,0,0,0.2);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 15px;
            color: var(--text);
            font-size: 1rem;
            margin-top: 20px;
            box-sizing: border-box;
            resize: none;
        }

        .btn-send {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: transform 0.2s;
            position: relative;
        }

        .btn-send:active { transform: scale(0.98); }

        #result-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            min-height: 50px;
            white-space: pre-wrap;
            font-style: italic;
            line-height: 1.6;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()">☀️</div>

    <div class="glass-card">
        <h1>L'Artiste AI</h1>
        <p style="opacity: 0.7;">Поэзия через призму технологий</p>

        <textarea id="promptInput" placeholder="Введите тему или первую строку стихотворения..."></textarea>

        <button class="btn-send" onclick="generatePoetry()">
            <span id="btnText">Создать шедевр</span>
            <div class="loader" id="loader"></div>
        </button>

        <div id="result-box">
            <div id="result-text">Ваше стихотворение появится здесь...</div>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        // Ключ API_KEY удален отсюда ради безопасности и перенесен в Cloudflare
        const PROXY_URL = "https://throbbing-sunset-6162.aleksandrbaharev37348.workers.dev";
        const ENDPOINT = PROXY_URL; 

        async function generatePoetry() {
            const promptInput = document.getElementById('promptInput');
            const resultText = document.getElementById('result-text');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');

            if (!promptInput.value) {
                alert("Пожалуйста, введите тему!");
                return;
            }

            // Анимация загрузки
            loader.style.display = 'block';
            btnText.style.display = 'none';
            resultText.innerText = 'Нейросеть настраивает лиру...';

            try {
                const response = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Напиши короткое и изящное стихотворение на тему: ${promptInput.value}. 
                                Используй метафоры и слог, характерный для поэтов Серебряного века. 
                                Выдай только текст стихотворения без лишних комментариев.`
                            }]
                        }]
                    })
                });

                const data = await response.json();

                // Обработка ответа от Gemini
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    resultText.innerText = data.candidates[0].content.parts[0].text;
                } else if (data.error) {
                    resultText.innerText = "Ошибка нейросети: " + data.error.message;
                } else {
                    resultText.innerText = "Что-то пошло не так. Попробуйте другую тему.";
                }

            } catch (error) {
                console.error(error);
                resultText.innerText = "Ошибка соединения: Воркер не ответил. Проверь настройки в Cloudflare.";
            } finally {
                loader.style.display = 'none';
                btnText.style.display = 'inline';
            }
        }

        // Переключение темы
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            const newTheme = current === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            document.querySelector('.theme-toggle').innerText = newTheme === 'light' ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
